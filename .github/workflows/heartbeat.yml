name: Keep Space Awake
on:
  schedule:
    # Runs every 24 hours at 00:00 UTC
    - cron: '0 0 * * *'
  # Allows you to run it manually from the "Actions" tab
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Space
        run: |
          curl -I https://ishizzz-my-nim.hf.space/v1
